services:
  backend:
    image: unidash-backend:latest
    container_name: unidash-backend
    restart: unless-stopped
    environment:
      - APP_NAME=UniDash
      - APP_VERSION=2.0.0
      - ENV=production
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - RATE_LIMIT_PER_MINUTE=60
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION_MINUTES=15
      - DATABASE_URL=sqlite:///./data/unidash.db
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CORS_ORIGINS=["http://localhost:9999","http://arr.cirrolink.com"]
      - LOG_LEVEL=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - unidash-data:/app/data
    networks:
      - unidash-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  frontend:
    image: unidash-frontend:latest
    container_name: unidash-frontend
    restart: unless-stopped
    ports:
      - "9999:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/services.json:/usr/share/nginx/html/services.json:ro
      - ./frontend/login.json:/usr/share/nginx/html/login.json:ro
      - ./frontend/infra.json:/usr/share/nginx/html/infra.json:ro
    networks:
      - unidash-network
      - media-stack
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  unidash-data:
    external: true
    name: unidash_unidash-data

networks:
  unidash-network:
    driver: bridge
  media-stack:
    external: true
    name: media-stack_media_network
