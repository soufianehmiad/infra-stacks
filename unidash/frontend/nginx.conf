map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $cookie_unidash_auth $unidash_authed {
    default 0;
    "1"     1;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — allows lazy resolution of upstream containers.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Security headers (apply to dashboard + proxied apps)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Local health endpoint (no backend required)
    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Dashboard config: keep it editable and avoid sticky browser caching.
    location = /services.json {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        add_header Cache-Control "no-store";
        try_files /services.json =404;
    }

    # Login token config (client-side auth). Do not cache.
    location = /login.json {
        add_header Cache-Control "no-store";
        try_files /login.json =404;
    }

    # Infrastructure metrics config (client-side). Do not cache.
    location = /infra.json {
        add_header Cache-Control "no-store";
        try_files /infra.json =404;
    }

    # Login art: don't cache (it is branding, can change, and may contain sensitive imagery).
    location = /login-art.svg {
        expires -1;
        add_header Cache-Control "no-store";
        try_files /login-art.svg =404;
    }

    # --- App reverse proxies (subpath /<app>/...) ---
    # Using variables forces runtime DNS resolution (requires resolver directive).

    location = /sonarr { return 301 /sonarr/; }
    location ^~ /sonarr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_sonarr http://sonarr:8989;
        proxy_pass $upstream_sonarr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location = /sonarr-anime { return 301 /sonarr-anime/; }
    location ^~ /sonarr-anime/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_sonarr_anime http://sonarr-anime:8989;
        proxy_pass $upstream_sonarr_anime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Back-compat alias (sonarr-anime was configured as /anime before)
    location = /anime { return 301 $scheme://$http_host/sonarr-anime/; }
    location ^~ /anime/ { return 301 $scheme://$http_host/sonarr-anime/; }

    location = /radarr { return 301 /radarr/; }
    location ^~ /radarr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_radarr http://radarr:7878;
        proxy_pass $upstream_radarr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location = /prowlarr { return 301 /prowlarr/; }
    location ^~ /prowlarr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_prowlarr http://prowlarr:9696;
        proxy_pass $upstream_prowlarr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location = /bazarr { return 301 /bazarr/; }
    location ^~ /bazarr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_bazarr http://bazarr:6767;
        proxy_pass $upstream_bazarr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location = /tautulli { return 301 /tautulli/; }
    location ^~ /tautulli/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_tautulli http://tautulli:8181;
        proxy_pass $upstream_tautulli;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # SABnzbd is configured with url_base=/sab
    location = /sab { return 301 /sab/; }
    location ^~ /sab/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_sab http://sabnzbd:8080;
        proxy_pass $upstream_sab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Back-compat alias
    location = /sabnzbd { return 301 $scheme://$http_host/sab/; }
    location ^~ /sabnzbd/ { return 301 $scheme://$http_host/sab/; }

    # qBittorrent: nginx strips /qbit/ prefix before forwarding.
    location = /qbit { return 301 /qbit/; }
    location ^~ /qbit/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_qbit http://qbittorrent:8080;
        rewrite ^/qbit/(.*)$ /$1 break;
        proxy_pass $upstream_qbit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /qbit/;
        proxy_redirect / /qbit/;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Back-compat alias
    location = /qbittorrent { return 301 $scheme://$http_host/qbit/; }
    location ^~ /qbittorrent/ { return 301 $scheme://$http_host/qbit/; }

    # MediaMgr API/WS proxy
    location = /mediamgr { return 301 /mediamgr/; }
    location ^~ /mediamgr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_mediamgr http://mediamgr:7474;
        proxy_pass $upstream_mediamgr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location = /flaresolverr { return 301 /flaresolverr/; }
    location ^~ /flaresolverr/ {
        if ($unidash_authed = 0) { return 302 /?next=$request_uri; }
        set $upstream_flaresolverr http://flaresolverr:8191;
        proxy_pass $upstream_flaresolverr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
