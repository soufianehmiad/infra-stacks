<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f5f5f5" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="#ffffff"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  
  <!-- Abstract geometric shapes representing containers/services -->
  <g opacity="0.8">
    <!-- Server stack -->
    <rect x="150" y="100" width="300" height="60" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="150" y="180" width="300" height="60" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="150" y="260" width="300" height="60" fill="none" stroke="#000" stroke-width="3"/>
    
    <!-- Connection lines -->
    <line x1="300" y1="160" x2="300" y2="180" stroke="#d97706" stroke-width="2"/>
    <line x1="300" y1="240" x2="300" y2="260" stroke="#d97706" stroke-width="2"/>
    
    <!-- Nodes -->
    <circle cx="200" cy="130" r="8" fill="#d97706"/>
    <circle cx="300" cy="130" r="8" fill="#10b981"/>
    <circle cx="400" cy="130" r="8" fill="#3b82f6"/>
    
    <circle cx="200" cy="210" r="8" fill="#10b981"/>
    <circle cx="300" cy="210" r="8" fill="#d97706"/>
    <circle cx="400" cy="210" r="8" fill="#10b981"/>
    
    <circle cx="200" cy="290" r="8" fill="#3b82f6"/>
    <circle cx="300" cy="290" r="8" fill="#10b981"/>
    <circle cx="400" cy="290" r="8" fill="#d97706"/>
  </g>
  
  <!-- Abstract data flow -->
  <g opacity="0.6">
    <path d="M 100 380 Q 200 360 300 380 T 500 380" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 100 420 Q 250 400 300 420 T 500 420" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <path d="M 100 460 Q 200 440 300 460 T 500 460" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Abstract labels -->
  <text x="300" y="550" font-family="monospace" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">DISTRIBUTED SYSTEM</text>
  <text x="300" y="570" font-family="monospace" font-size="10" fill="#999" text-anchor="middle">CONTAINERIZED INFRASTRUCTURE</text>
</svg>
