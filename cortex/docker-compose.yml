# cortex/docker-compose.yml
services:
  frontend:
    build: ./frontend
    container_name: cortex-frontend
    ports:
      - "9999:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cortex
    labels:
      cortex.enable: "true"
      cortex.name: "cortex-frontend"
      cortex.type: "web"
      cortex.port: "9999"
      cortex.url: "https://cortex.cirrolink.com"

  api:
    build: ./api
    container_name: cortex-api
    env_file: .env
    environment:
      - PVE_HOST=${PVE_HOST:-10.99.0.254}
      - PVE_TOKEN_ID=${PVE_TOKEN_ID}
      - PVE_TOKEN_SECRET=${PVE_TOKEN_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./secrets/cf_key:/run/secrets/cf_key:ro
    restart: unless-stopped
    networks:
      - cortex
    labels:
      cortex.enable: "true"
      cortex.name: "cortex-api"
      cortex.type: "api"
      cortex.port: "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  encoder:
    build: ./encoder
    container_name: cortex-encoder
    env_file: .env
    volumes:
      - /media:/media:ro
      - cortex-data:/data
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    environment:
      - LIBVA_DRIVER_NAME=iHD
    restart: unless-stopped
    networks:
      - cortex
    labels:
      cortex.enable: "true"
      cortex.name: "cortex-encoder"
      cortex.type: "encoder"
      cortex.port: "8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/encoder/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  portainer_agent:
    image: portainer/agent:latest
    container_name: portainer_agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    restart: unless-stopped
    networks:
      - cortex

volumes:
  cortex-data:

networks:
  cortex:
    driver: bridge
